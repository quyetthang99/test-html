<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ tính Lệch pha & Lưu dữ liệu</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px auto; 
            max-width: 450px; 
            background-color: #f9f9f9;
        }
        .container { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="number"], input[type="text"] { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 16px;
        }
        .result-box { 
            background: #e9ecef; 
            padding: 15px; 
            margin-top: 20px; 
            border-radius: 5px; 
        }
        .result-box p { margin: 8px 0; font-size: 16px; }
        .result-box span { font-weight: bold; color: #d9534f; }
        button { 
            padding: 12px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px;
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            margin-top: 15px;
            font-weight: bold;
        }
        button:hover { background: #218838; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tính Lệch Pha</h2>

    <div class="form-group">
        <label>Tên Trạm / Vị trí:</label>
        <input type="text" id="tenTram" placeholder="VD: TBA Văn Bàn 1..." required>
    </div>

    <div class="form-group">
        <label>Dòng điện pha A (Ia):</label>
        <input type="number" id="ia" step="any" oninput="tinhToan()">
    </div>
    <div class="form-group">
        <label>Dòng điện pha B (Ib):</label>
        <input type="number" id="ib" step="any" oninput="tinhToan()">
    </div>
    <div class="form-group">
        <label>Dòng điện pha C (Ic):</label>
        <input type="number" id="ic" step="any" oninput="tinhToan()">
    </div>

    <div class="result-box">
        <p>Dòng trung bình (Itb): <span id="itb_res">0.00</span></p>
        <p>Dòng điện Io: <span id="i0_res">0.00</span></p>
        <p>Tỷ lệ lệch pha: <span id="lechpha_res">0.00</span> %</p>
    </div>

    <button onclick="luuDuLieu()" id="btnSave">Lưu lên Google Sheet</button>
    <div id="status"></div>
</div>

<script>
    // ========================================================
    // BƯỚC QUAN TRỌNG: DÁN LINK WEB APP CỦA BẠN VÀO DƯỚI ĐÂY
    // ========================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9oqsdk7xnXPQ7QIfb-M-s25T5A17e3PVBF_bo3NSR4gR4V6WuY0aC-aXpVOWVj3Xm/exec";

    function tinhToan() {
        let ia = parseFloat(document.getElementById('ia').value) || 0;
        let ib = parseFloat(document.getElementById('ib').value) || 0;
        let ic = parseFloat(document.getElementById('ic').value) || 0;
        let tenTram = document.getElementById('tenTram').value;

        let itb = (ia + ib + ic) / 3;
        let i0 = Math.sqrt(Math.pow(ia, 2) + Math.pow(ib, 2) + Math.pow(ic, 2) - (ia*ib) - (ib*ic) - (ic*ia));
        let lechpha = (itb === 0) ? 0 : (i0 / itb) * 100;

        document.getElementById('itb_res').innerText = itb.toFixed(2);
        document.getElementById('i0_res').innerText = i0.toFixed(2);
        document.getElementById('lechpha_res').innerText = lechpha.toFixed(2);
        
        return { 
            tenTram: tenTram,
            ia: ia, 
            ib: ib, 
            ic: ic, 
            i0: parseFloat(i0.toFixed(2)), 
            lechPha: parseFloat(lechpha.toFixed(2)) 
        };
    }

    function luuDuLieu() {
        let data = tinhToan();
        let statusDiv = document.getElementById('status');
        let btn = document.getElementById('btnSave');

        if (!data.tenTram.trim()) {
            alert("Vui lòng nhập Tên trạm trước khi lưu!");
            document.getElementById('tenTram').focus();
            return;
        }

        if (SCRIPT_URL === "DÁN_LINK_URL_ỨNG_DỤNG_WEB_VÀO_ĐÂY" || SCRIPT_URL === "") {
            alert("Lỗi: Bạn chưa gắn link API của Google Script vào file HTML!");
            return;
        }

        statusDiv.innerText = "⏳ Đang lưu dữ liệu...";
        statusDiv.style.color = "#007bff";
        btn.disabled = true;

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(() => {
            statusDiv.innerText = "✅ Đã lưu dữ liệu thành công!";
            statusDiv.style.color = "green";
            btn.disabled = false;
        }).catch(error => {
            statusDiv.innerText = "❌ Có lỗi xảy ra. Vui lòng thử lại!";
            statusDiv.style.color = "red";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
